<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Elementa Box | Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { 
      --primary: #ff4500; 
      --primary-dark: #cc3700;
      --secondary: #1e1e1e; 
      --bg-dark: #0a0a0a; 
      --text-main: #ffffff;
      --text-muted: #9ca3af;
      --card-bg: rgba(30, 30, 30, 0.85);
      --gold: #fbbf24;
    }
    
    body { 
      margin: 0; padding: 0; 
      background-color: var(--bg-dark); 
      background-image: radial-gradient(circle at top right, rgba(255, 69, 0, 0.15) 0%, transparent 40%), radial-gradient(circle at bottom left, rgba(255, 69, 0, 0.1) 0%, transparent 40%);
      font-family: 'Roboto', sans-serif; 
      color: var(--text-main); 
      text-align: center; 
      overflow-y: auto; 
      overflow-x: hidden; 
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    }

    @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

    .view-container { 
      width: 100%; max-width: 450px; 
      padding: 20px; box-sizing: border-box; 
      display: none; 
      animation: fadeSlideUp 0.5s ease-out forwards;
      margin-bottom: 20px;
    }
    .view-container.active { display: block; }

    h1, h2, h3 { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; margin-top: 0; letter-spacing: -0.5px;}
    .title-brand { font-size: 32px; font-style: italic; color: var(--text-main); text-shadow: 2px 2px 0px var(--primary); margin-bottom: 5px;}
    
    .input-group { margin-bottom: 16px; text-align: left; }
    label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;}
    input, select, textarea { 
      width: 100%; padding: 14px; 
      background: rgba(0, 0, 0, 0.5); 
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; 
      box-sizing: border-box; font-size: 15px; color: white; 
      font-family: 'Roboto', sans-serif; transition: all 0.3s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); background: rgba(0, 0, 0, 0.8); }
    
    .btn { 
      width: 100%; padding: 16px; margin-top: 10px;
      background: var(--primary); color: white; 
      border: none; border-radius: 8px; 
      font-size: 16px; font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase; 
      cursor: pointer; box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3); transition: all 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.2); box-shadow: none; }

    .dashboard-header { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: left; position: relative;}
    .user-greeting { font-size: 14px; color: var(--text-muted); }
    .user-name { font-size: 22px; font-family: 'Montserrat'; font-weight: 800; margin: 4px 0 15px 0;}
    
    .stat-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05);}
    .stat-value { font-size: 28px; font-weight: 900; font-family: 'Montserrat'; color: var(--gold); display: flex; align-items: center; justify-content: center; gap: 5px;}
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: block;}

    .leaderboard-list { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);}
    .leaderboard-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .leaderboard-item:last-child { border-bottom: none; }
    .rank { font-size: 18px; font-weight: 900; font-family: 'Montserrat'; width: 30px; color: var(--text-muted);}
    .rank-1 { color: var(--gold); font-size: 22px;}
    .rank-2 { color: #e5e7eb; }
    .rank-3 { color: #d97706; }
    .lb-user { flex: 1; text-align: left; padding-left: 10px; font-weight: 700; font-size: 15px;}
    .lb-points { font-weight: 900; font-family: 'Montserrat'; color: var(--primary); }

    .quick-nav { display: flex; gap: 10px; margin-top: 20px;}
    .quick-nav .btn { font-size: 13px; padding: 12px; }

    .link { color: var(--primary); cursor: pointer; text-decoration: underline; font-size: 13px;}

    .loader-box { width: 60px; height: 60px; border: 5px solid rgba(255,69,0,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;}
    @keyframes spin { to { transform: rotate(360deg); } }

    .points-animation {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
      font-family: 'Montserrat'; font-size: 48px; font-weight: 900; color: var(--gold);
      text-shadow: 0 10px 30px rgba(251, 191, 36, 0.5);
      opacity: 0; pointer-events: none; z-index: 9999;
      animation: popPoints 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes popPoints { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 80% { opacity: 1; transform: translate(-50%, -80%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -100%) scale(0.8); } }

    .modulo-badge {
        position: absolute; top: 20px; right: 20px; color: white; padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); z-index: 100; display: none;
    }
  </style>
</head>
<body>

  <!-- PANTALLA DE CARGA -->
  <div class="view-container active" id="vistaLoader" style="padding-top: 40vh;">
    <div class="loader-box"></div>
    <h2 class="title-brand" style="font-size: 24px;">ELEMENTA BOX</h2>
    <div id="loaderMsg" style="color: var(--text-muted); font-size: 14px; margin-top: 10px;">Conectando...</div>
  </div>

  <!-- LOGIN -->
  <div class="view-container" id="vistaLogin" style="padding-top: 15vh;">
    <h1 class="title-brand" style="font-size: 42px; margin-bottom: 5px;">ELEMENTA</h1>
    <p style="color: var(--text-muted); margin-bottom: 30px; letter-spacing: 2px;">PERFORMANCE TRACKER</p>
    
    <div class="input-group">
      <label>ATLETA (NOMBRE REGISTRADO)</label>
      <input type="text" list="listaNombres" id="loginNombre" placeholder="Buscar nombre..." autocomplete="off">
      <datalist id="listaNombres"></datalist>
    </div>
    <div class="input-group">
      <label>CONTRASEÑA</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>

    <button class="btn" onclick="iniciarSesion()">ENTRAR AL BOX</button>
  </div>

  <!-- DASHBOARD PRINCIPAL -->
  <div class="view-container" id="vistaDashboard">
    <div id="badgeModulo" class="modulo-badge">ELEMENTA</div>
    <div class="dashboard-header">
      <div class="user-greeting">Hola, atleta</div>
      <div class="user-name" id="dashNombre">NOMBRE ATLETA</div>
      
      <div class="stat-box">
        <div class="stat-value" id="dashPuntos">🏆 0</div>
        <div class="stat-label">PUNTOS ACUMULADOS EN EL BOX</div>
      </div>
    </div>

    <button class="btn" onclick="prepararRutina()" style="padding: 20px; font-size: 18px; margin-bottom: 15px;">🏋️ REGISTRAR PR</button>
    
    <div class="quick-nav">
      <button class="btn btn-outline" onclick="mostrarLeaderboard()" style="flex:1;">🏆 LEADERBOARD</button>
      <button class="btn btn-outline" onclick="cerrarSesion()" style="flex:1; border-color: #ef4444; color: #ef4444;">SALIR</button>
    </div>
  </div>

  <!-- RUTINA / REGISTRO DE MARCA -->
  <div class="view-container" id="vistaRutina">
    <h2 style="text-align: left; font-size: 20px; margin-bottom: 5px;">REGISTRO DE MARCA</h2>
    <p style="text-align: left; color: var(--text-muted); font-size: 13px; margin-bottom: 20px; margin-top:0;">Guarda tu progreso y gana puntos reales.</p>

    <div class="input-group">
      <label>CATEGORÍA DEL EJERCICIO</label>
      <select id="appCategoria" onchange="actualizarMovimientos()"></select>
    </div>

    <div class="input-group">
      <label>MOVIMIENTO</label>
      <select id="appMovimiento"><option value="">Seleccione...</option></select>
    </div>

    <div class="input-group">
      <label>RESULTADO (PESO / REPS / TIEMPO)</label>
      <input type="text" id="appResultado" placeholder="Ej. 100 kg x 5 reps, o 5:30 min">
    </div>

    <div class="input-group">
      <label>OBSERVACIONES (OPCIONAL)</label>
      <textarea id="appObservaciones" rows="2" placeholder="Me sentí fuerte, fallé el último intento..."></textarea>
    </div>

    <button class="btn" style="margin-top: 20px;" onclick="enviarRutina()">🚀 SUBIR RESULTADO (+50 PTS)</button>
    <button class="btn btn-outline" style="margin-top: 10px; font-size: 13px;" onclick="cambiarVista('vistaDashboard')">CANCELAR</button>
  </div>

  <!-- LEADERBOARD -->
  <div class="view-container" id="vistaLeaderboard">
    <h2 style="font-size: 24px; color: var(--gold); margin-bottom: 5px;">TOP ATLETAS</h2>
    <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">Los puntajes reales del Box.</p>

    <div class="leaderboard-list" id="listaLeaderboard">
      <!-- Se llena por JS -->
    </div>

    <button class="btn btn-outline" style="margin-top: 25px;" onclick="cambiarVista('vistaDashboard')">VOLVER AL DASHBOARD</button>
  </div>

  <div style="position: relative; margin-top: 25px; width: 100%; text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 4px; text-transform: uppercase; font-weight: 700; padding-bottom: 20px;">
    Desarrollado para ⚡ Elementa Box ⚡
  </div>

  <script>
    // =========================================================
    // PEGA AQUÍ TU ÚLTIMA URL DESPUÉS DE LA NUEVA IMPLEMENTACIÓN
    // =========================================================
    const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbwvf_1k7tYp0OEME00nrLQjoMiJzYECQyJuSkvw8Q81AIauyJ3TA2wwvFWZa2PjRY6A/exec';
    
    // DATOS HARDCODEADOS PARA EL BOX
    const GYM_DATA = {
      "HALTEROFILIA": ["Snatch (Arranque)", "Clean & Jerk (Envión)", "Squat Clean", "Power Snatch", "Overhead Squat", "Front Squat", "Back Squat", "Deadlift (Peso Muerto)"],
      "GIMNASIA": ["Pull-ups (Dominadas)", "Chest to Bar", "Muscle Up (Barra)", "Muscle Up (Anillas)", "Toes to Bar", "Handstand Walk", "HSPU"],
      "METCON / CARDIO": ["Remo (Row)", "Assault Bike", "Correr (Run)", "Double Unders", "Burpees", "Box Jumps", "Wall Balls"]
    };

    let usuarioActual = {};
    let backendLeaderboard = []; 

    // COMUNICACIÓN BLINDADA CONTRA ERRORES
    async function peticionBackend(payload) {
        try {
            const response = await fetch(URL_APPS_SCRIPT, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload) 
            });
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (err) {
                return { estado: "error", mensaje: "Google bloqueó la conexión. ¿Aseguraste poner 'Cualquier persona' en la nueva implementación?" };
            }
        } catch (error) {
            return { estado: "error", mensaje: "Error de red. Asegúrate de NO abrir el archivo dando doble clic desde el escritorio, ábrelo desde GitHub Pages." };
        }
    }

    window.addEventListener('DOMContentLoaded', async () => {
        mostrarLoader("Cargando base de datos...");
        const result = await peticionBackend({ action: 'init' });
        
        if (result.estado === 'exito') {
            backendLeaderboard = result.leaderboard || [];
            
            // Protección contra errores nulos (innerHTML)
            const datalist = document.getElementById('listaNombres');
            if(datalist) {
                datalist.innerHTML = '';
                backendLeaderboard.forEach(user => {
                    let option = document.createElement('option');
                    option.value = user.nombre;
                    datalist.appendChild(option);
                });
            }

            ocultarLoader();
            cambiarVista('vistaLogin');
        } else {
            alert("⚠️ ERROR: " + result.mensaje); 
            ocultarLoader();
            cambiarVista('vistaLogin');
        }
    });

    async function iniciarSesion() {
      const nombre = document.getElementById('loginNombre').value.trim().toUpperCase();
      const password = document.getElementById('loginPassword').value.trim();
      if(!nombre || !password) return alert("Por favor ingresa Atleta y Contraseña.");
      
      mostrarLoader("Autenticando...");
      const res = await peticionBackend({ action: 'login', nombre: nombre, password: password });
      
      if(res.estado === 'exito') {
        usuarioActual = res;
        
        const nombreObj = document.getElementById('dashNombre');
        if(nombreObj) nombreObj.innerText = res.nombre;
        
        const badge = document.getElementById('badgeModulo');
        if(badge) {
            badge.style.display = 'block';
            badge.innerText = '🏋️ ELEMENTA';
            badge.style.background = 'linear-gradient(135deg, #ff4500, #cc3700)';
        }
        
        const puntosObj = document.getElementById('dashPuntos');
        if(puntosObj) puntosObj.innerText = `🏆 ${res.puntos}`;

        const passObj = document.getElementById('loginPassword');
        if(passObj) passObj.value = ''; 
        
        ocultarLoader();
        cambiarVista('vistaDashboard');
      } else {
          alert("❌ " + res.mensaje);
          ocultarLoader();
      }
    }

    function prepararRutina() {
        const selectCat = document.getElementById('appCategoria');
        if(selectCat) {
            selectCat.innerHTML = '<option value="">Seleccione Categoría...</option>';
            Object.keys(GYM_DATA).forEach(cat => {
                selectCat.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }
        
        const selectMov = document.getElementById('appMovimiento');
        if(selectMov) selectMov.innerHTML = '<option value="">Seleccione...</option>';
        
        const resObj = document.getElementById('appResultado');
        if(resObj) resObj.value = '';
        
        const obsObj = document.getElementById('appObservaciones');
        if(obsObj) obsObj.value = '';
        
        cambiarVista('vistaRutina');
    }

    function actualizarMovimientos() {
        const cat = document.getElementById('appCategoria').value;
        const selectMov = document.getElementById('appMovimiento');
        if(selectMov) {
            selectMov.innerHTML = '<option value="">Seleccione Movimiento...</option>';
            if(GYM_DATA[cat]) {
                GYM_DATA[cat].forEach(mov => {
                    selectMov.innerHTML += `<option value="${mov}">${mov}</option>`;
                });
            }
        }
    }

    async function enviarRutina() {
        const categoria = document.getElementById('appCategoria').value;
        const movimiento = document.getElementById('appMovimiento').value;
        const resultado = document.getElementById('appResultado').value.trim();
        const observaciones = document.getElementById('appObservaciones').value.trim();
        
        if(!categoria || !movimiento || !resultado) {
            return alert("Selecciona la categoría, el movimiento y anota tu resultado.");
        }

        mostrarLoader("Guardando y sumando puntos...");
        
        const resEnvio = await peticionBackend({ 
            action: 'save_pr', 
            cedula: usuarioActual.cedula
        });
        
        if (resEnvio.estado === 'exito') {
            usuarioActual.puntos = resEnvio.nuevosPuntos;
            const puntosObj = document.getElementById('dashPuntos');
            if(puntosObj) puntosObj.innerText = `🏆 ${usuarioActual.puntos}`;

            let wsText = `*--- NUEVO PR | ELEMENTA BOX ---*\n`;
            wsText += `*Atleta:* ${usuarioActual.nombre}\n`;
            wsText += `*Movimiento:* ${movimiento}\n`;
            wsText += `*Marca:* ${resultado}\n`;
            if (observaciones !== "") wsText += `*Sensaciones:* _${observaciones}_\n`;

            let linkWa = `https://wa.me/?text=${encodeURIComponent(wsText)}`;
            let btnWhatsAppHTML = `<br><br><a href="${linkWa}" target="_blank" style="text-decoration:none; display: block;"><button class="btn btn-outline" style="border-color: #10b981; color: #10b981; margin-top:0;">💬 COMPARTIR EN WHATSAPP</button></a>`;

            ocultarLoader();
            mostrarAnimacionPuntos("+50 PTS");
            
            const divExito = document.createElement('div');
            divExito.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100vh; background:rgba(0,0,0,0.9); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;";
            divExito.innerHTML = `
                <h2 style="color:#10b981; font-size: 24px;">¡MARCA REGISTRADA!</h2>
                <p style="color:#9ca3af; text-align:center;">Se han sumado 50 puntos a tu perfil.</p>
                ${btnWhatsAppHTML}
                <button class="btn" style="max-width: 300px; margin-top: 20px;" onclick="this.parentElement.remove(); cambiarVista('vistaDashboard');">VOLVER AL DASHBOARD</button>
            `;
            document.body.appendChild(divExito);
            
            let userInLb = backendLeaderboard.find(u => u.nombre === usuarioActual.nombre);
            if (userInLb) userInLb.puntos = usuarioActual.puntos;

        } else {
            ocultarLoader();
            alert("❌ Hubo un error guardando tu registro: " + resEnvio.mensaje); 
        }
    }

    function mostrarLeaderboard() {
        const lista = document.getElementById('listaLeaderboard');
        if(!lista) return;

        lista.innerHTML = "";
        let competidores = [...backendLeaderboard].sort((a,b) => b.puntos - a.puntos);

        if (competidores.length === 0) {
           lista.innerHTML = "<div style='padding:20px; color:#9ca3af;'>No hay puntajes aún.</div>";
        }

        competidores.slice(0, 7).forEach((c, i) => {
            let rankClass = i === 0 ? 'rank-1' : (i === 1 ? 'rank-2' : (i === 2 ? 'rank-3' : ''));
            let isMe = c.nombre === usuarioActual.nombre;
            let row = `
                <div class="leaderboard-item" style="${isMe ? 'background: rgba(255,69,0,0.1);' : ''}">
                    <div class="rank ${rankClass}">${i + 1}</div>
                    <div class="lb-user" style="${isMe ? 'color: var(--primary);' : ''}">${c.nombre} ${isMe ? '(Tú)' : ''}</div>
                    <div class="lb-points">${c.puntos} pts</div>
                </div>
            `;
            lista.innerHTML += row;
        });

        cambiarVista('vistaLeaderboard');
    }

    function mostrarAnimacionPuntos(texto) {
        const anim = document.createElement('div');
        anim.className = 'points-animation';
        anim.innerText = texto;
        document.body.appendChild(anim);
        setTimeout(() => { anim.remove(); }, 2000);
    }

    function cerrarSesion() {
        usuarioActual = {};
        cambiarVista('vistaLogin');
    }

    function cambiarVista(idVista) {
      document.querySelectorAll('.view-container').forEach(c => c.classList.remove('active'));
      const view = document.getElementById(idVista);
      if(view) view.classList.add('active');
    }

    function mostrarLoader(msg) {
        const msgObj = document.getElementById('loaderMsg');
        if(msgObj) msgObj.innerText = msg;
        
        const loader = document.getElementById('vistaLoader');
        if(loader) {
            loader.style.display = 'block';
            loader.style.position = 'fixed';
            loader.style.top = '0';
            loader.style.left = '0';
            loader.style.height = '100vh';
            loader.style.zIndex = '999';
            loader.style.backgroundColor = 'rgba(0,0,0,0.9)';
        }
    }

    function ocultarLoader() {
        const loader = document.getElementById('vistaLoader');
        if(loader) {
            loader.style.display = 'none';
            loader.style.position = 'relative';
            loader.style.height = 'auto';
            loader.style.backgroundColor = 'transparent';
        }
    }
  </script>
</body>
</html>
